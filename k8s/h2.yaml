apiVersion: apps/v1
kind: Deployment
metadata:
  name: h2-db
  namespace: cqrs-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: h2-db
  template:
    metadata:
      labels:
        app: h2-db
    spec:
      containers:
        - name: h2
          image: oscarfonts/h2
          ports:
            - containerPort: 9092
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: h2-db
  namespace: cqrs-lab
spec:
  selector:
    app: h2-db
  ports:
    - name: tcp
      port: 9092
      targetPort: 9092
    - name: web
      port: 8082
      targetPort: 8082