mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=token-api

quarkus.datasource.write.db-kind=h2
quarkus.datasource.write.jdbc.url=jdbc:h2:file:./data/write-db
quarkus.datasource.write.username=sa
quarkus.datasource.write.password=

%test.quarkus.datasource.write.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm."write".database.generation=drop-and-create

quarkus.hibernate-orm."write".datasource=write
quarkus.hibernate-orm."write".packages=com.lab.write.entity
quarkus.hibernate-orm."write".database.generation=update
quarkus.hibernate-orm."write".log.sql=true

quarkus.smallrye-openapi.store-schema-directory=target/openapi

