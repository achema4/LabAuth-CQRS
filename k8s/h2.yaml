apiVersion: apps/v1
kind: Deployment
metadata:
  name: h2-db
  namespace: cqrs-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: h2-db
  template:
    metadata:
      labels:
        app: h2-db
    spec:
      containers:
        - name: h2
          image: oscarfonts/h2:2.2.224
          command:
            - /opt/h2/bin/h2.sh
          args:
            - "-tcp"
            - "-tcpAllowOthers"
            - "-tcpPort"
            - "9092"
            - "-web"
            - "-webAllowOthers"
            - "-webPort"
            - "8082"
          ports:
            - name: tcp
              containerPort: 9092
            - name: web
              containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: h2-db
  namespace: cqrs-lab
spec:
  selector:
    app: h2-db
  ports:
    - name: tcp
      port: 9092
      targetPort: 9092
    - name: web
      port: 8082
      targetPort: 8082